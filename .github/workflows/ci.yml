name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  elisp:
    name: Elisp (ERT + guards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: "30.1"

      # The tier boundary: emacs/core must load with no app layer, no org.
      - name: Core isolation guard
        run: emacs -Q --batch -l test/core-load-test.el

      - name: Main ERT suite
        run: emacs -Q --batch -l test/eabp-tests.el -f ert-run-tests-batch-and-exit

      - name: Primitives ERT suite
        run: emacs -Q --batch -l test/eabp-primitives-test.el -f ert-run-tests-batch-and-exit

      # Root eabp-core.el / glasspane.el are generated; a PR that edits
      # emacs/ sources must ship regenerated bundles (CONTRIBUTING rule 4).
      - name: Bundles are current
        run: |
          emacs --batch -l emacs/build-bundle.el
          git diff --exit-code eabp-core.el glasspane.el

  android:
    name: Android (:eabp + :app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build both modules
        run: |
          chmod +x gradlew
          ./gradlew :eabp:assembleDebug :app:assembleDebug --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: glasspane-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
