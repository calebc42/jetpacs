name: CI

on:
  push:
    # This file rides the slop-fork line; its branches live under slop-fork/.
    branches: ["slop-fork/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  elisp:
    name: Elisp (ERT + guards)
    runs-on: ubuntu-latest
    steps:
      # The ebp submodule carries the wire contract (SPEC, contract.json,
      # goldens) that the drift and conformance tests read.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: purcell/setup-emacs@master
        with:
          version: "30.1"

      # The tier boundary: emacs/core must load with no app layer, no org.
      - name: Core isolation guard
        run: emacs -Q --batch -l test/core-load-test.el

      - name: Main ERT suite
        run: emacs -Q --batch -l test/jetpacs-tests.el -f ert-run-tests-batch-and-exit

      - name: Primitives ERT suite
        run: emacs -Q --batch -l test/jetpacs-primitives-test.el -f ert-run-tests-batch-and-exit

      # Root jetpacs-core.el is generated; a PR that edits emacs/ sources
      # must ship the regenerated bundle (CONTRIBUTING rule 4).
      - name: Bundle is current
        run: |
          emacs --batch -l emacs/build-bundle.el
          git diff --exit-code jetpacs-core.el

      # The pre-MELPA install path (hardening Task 24): the multi-file
      # core must install as a package via the network-free
      # package-vc-install-from-checkout, (require 'jetpacs) must work,
      # and the Version: header must equal jetpacs-api-version.
      - name: package-vc install path
        run: |
          tmp=$(mktemp -d)
          cp -r emacs/core "$tmp/jetpacs"
          git -C "$tmp/jetpacs" init -q
          git -C "$tmp/jetpacs" -c user.email=ci@example.com -c user.name=ci add -A
          git -C "$tmp/jetpacs" -c user.email=ci@example.com -c user.name=ci commit -qm checkout
          emacs -Q --batch --eval "(progn (require 'package) (setq package-user-dir \"$tmp/elpa\") (require 'package-vc) (package-vc-install-from-checkout \"$tmp/jetpacs\" \"jetpacs\") (package-initialize) (require 'jetpacs) (let ((hdr (package-version-join (package-desc-version (cadr (assq 'jetpacs package-alist)))))) (unless (equal hdr jetpacs-api-version) (error \"Version: header %s != jetpacs-api-version %s\" hdr jetpacs-api-version))))"

  android:
    name: Android (:jetpacs + :app)
    runs-on: ubuntu-latest
    steps:
      # WireGoldenConformanceTest reads ebp/contract.json + ebp/goldens/.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests and lint
        run: |
          chmod +x gradlew
          ./gradlew :jetpacs:testDebugUnitTest :app:testDebugUnitTest :jetpacs:lintDebug :app:lintDebug --console=plain

      - name: Build both modules
        run: |
          ./gradlew :jetpacs:assembleDebug :app:assembleDebug --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: glasspane-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
